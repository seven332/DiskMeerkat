name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format and test
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check formatting
        run: >-
          swift format lint
          --configuration .swift-format
          --recursive
          --parallel
          --strict
          DiskMeerkat
          DiskMeerkatUITests
          Packages/DiskMeerkatApp

      - name: Run package tests
        run: swift test --package-path Packages/DiskMeerkatApp

      - name: Run app tests
        run: |
          xcodebuild test \
            -project DiskMeerkat.xcodeproj \
            -scheme DiskMeerkat \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM=

      - name: Verify release app boundary
        run: |
          release_derived_data="$RUNNER_TEMP/ReleaseDerivedData"
          xcodebuild build \
            -project DiskMeerkat.xcodeproj \
            -scheme DiskMeerkat \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$release_derived_data" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM=

          release_app="$release_derived_data/Build/Products/Release/DiskMeerkat.app"
          .github/scripts/verify-release-app.sh "$release_app"
