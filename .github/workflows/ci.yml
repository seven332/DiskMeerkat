name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format and test
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check formatting
        run: >-
          swift format lint
          --configuration .swift-format
          --recursive
          --parallel
          --strict
          DiskMeerkat
          DiskMeerkatUITests
          Packages/DiskMeerkatApp

      - name: Run package tests
        run: swift test --package-path Packages/DiskMeerkatApp

      - name: Run app tests
        run: |
          xcodebuild test \
            -project DiskMeerkat.xcodeproj \
            -scheme DiskMeerkat \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM=

      - name: Verify release app boundary
        run: |
          release_derived_data="$RUNNER_TEMP/ReleaseDerivedData"
          xcodebuild build \
            -project DiskMeerkat.xcodeproj \
            -scheme DiskMeerkat \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$release_derived_data" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM=

          release_app="$release_derived_data/Build/Products/Release/DiskMeerkat.app"
          info_plist="$release_app/Contents/Info.plist"
          executable="$release_app/Contents/MacOS/DiskMeerkat"
          test -f "$info_plist"
          test -x "$executable"

          minimum_system_version="$(plutil -extract LSMinimumSystemVersion raw -o - "$info_plist")"
          if [[ "$minimum_system_version" != "15.0" ]]; then
            echo "Release app must require macOS 15.0; found: $minimum_system_version" >&2
            exit 1
          fi

          lsui_element="$(plutil -extract LSUIElement raw -o - "$info_plist")"
          if [[ "$lsui_element" != "true" ]]; then
            echo "Release app must set LSUIElement to true; found: $lsui_element" >&2
            exit 1
          fi

          release_strings="$RUNNER_TEMP/DiskMeerkat-release-strings.txt"
          strings "$executable" > "$release_strings"
          fixture_keys=(
            DISK_MEERKAT_UI_TEST_FIXTURE
            DISK_MEERKAT_UI_TEST_SESSION
            DISK_MEERKAT_UI_TEST_ACTIVATE_DURING_LAUNCH
          )
          for fixture_key in "${fixture_keys[@]}"; do
            if grep -Fq "$fixture_key" "$release_strings"; then
              echo "Release executable contains UI-test fixture key: $fixture_key" >&2
              exit 1
            fi
          done
