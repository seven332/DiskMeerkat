name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format and test
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check formatting
        run: >-
          swift format lint
          --configuration .swift-format
          --recursive
          --parallel
          --strict
          DiskMeerkat
          DiskMeerkatTests
          DiskMeerkatUITests

      - name: Run tests
        run: |
          # Hosted runner OS releases can trail the project's deployment target.
          runner_deployment_target="$(sw_vers -productVersion | cut -d. -f1,2)"
          xcodebuild test \
            -project DiskMeerkat.xcodeproj \
            -scheme DiskMeerkat \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM= \
            MACOSX_DEPLOYMENT_TARGET="$runner_deployment_target"
